<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<title>Mecaform</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="page-init">
		<div>
			<h1>Tarefas pendentes do 1-Meca:</h1>
			<ul id="it-flist">
			</ul>
			<h2 id="it-msgload">Carregando as tarefas... (isso pode demorar um pouco)</h2>
			<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcShK42odeWlYQOSuNWda_jDTdwqPxURslx_7w7LHLooQQ&s=10">
			<h3>v0.5</h3>
		</div>
		<button id="it-inewf">+</button>
	</div>
	<div id="page-form" style="display: flex; flex-direction: column;">
		<h1>Preencha os campos abaixo:</h1>
		<label>Titulo da tarefa</label>
		<input id="fm-ititle">
		<label>Descrição da tarefa</label>
		<input id="fm-idesc">
		<label>Data de entrega</label>
		<input type="date" id="fm-idate">
		<div style="margin-top: 15px; display: flex; gap: 15px;">
			<button id="fm-isendf" class="fm-btnc1">></button>
			<button id="fm-icancelf" class="fm-btnc1">x</button>
		</div>
	</div>
	<script type="module" src="client.js"></script>
</body>
