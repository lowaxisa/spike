<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<title>spike</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="page-init">
		<div>
			<h1>Tarefas pendentes do 1-Meca:</h1>
			<ul id="it-flist">
			</ul>
			<h2 id="it-msgload">Carregando as tarefas... (isso pode demorar um pouco)</h2>
			<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcShK42odeWlYQOSuNWda_jDTdwqPxURslx_7w7LHLooQQ&s=10">
